<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Titan Coffee Run account password.">
    <title>Reset Password | Titan Coffee Run</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>

    <header>
        <h1>Titan Coffee Run</h1>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="apply.html">Apply for Credit</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="#" id="logoutLink">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Reset Your Password</h2>
            <p>Enter a new password for your Titan Coffee Run account.</p>

            <form id="resetPasswordForm" novalidate>
                

                <div class="form-row">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password">
                    <span class="helper-message" id="newPasswordHelper"></span>
                    <span class="helper-message" id="newPasswordStrength"></span>
                </div>

                <div class="form-row">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Re-enter new password">
                    <span class="helper-message" id="confirmNewPasswordHelper"></span>
                    <span class="helper-message" id="newPasswordMatch"></span>
                </div>

                <div class="button-row">
                    <button type="submit" id="resetPasswordButton">Reset Password</button>
                </div>
            </form>

            <div id="resetResultsContainer" class="helper-message"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Titan Coffee Run. Serving St. Petersburg College.</p>
    </footer>

  <script type="module" src="js/auth-ui.js"></script>
  <script type="module" src="js/reset-password.js"></script>
</body>
</html>
