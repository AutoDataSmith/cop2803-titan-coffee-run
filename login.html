<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your Titan Coffee Run account.">
  <title>Login | Titan Coffee Run</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Titan Coffee Run</h1>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="apply.html">Apply for Credit</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="#" id="logoutLink">Logout</a></li>
                <li><a href="reset-password.html" id="resetPasswordLink">Change Password</a></li>
            </ul>
        </nav>
    </header>

    <main  style="display: none;">
        <section class="form-section">
            <h2>Log In to Your Account</h2>
            <p>Enter your email address and password to access your Titan Coffee Run account.</p>

            <form id="loginForm" novalidate>
                <div class="form-row">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="loginEmail" placeholder="name@example.com">
                <span class="helper-message" id="loginEmailHelper"></span>
                </div>

                <div class="form-row">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter password">
                <span class="helper-message" id="loginPasswordHelper"></span>
                </div>

                <div class="button-row">
                <button type="submit" id="loginButton">Login</button>
                </div>
            </form>

            <p><a href="reset-password.html">Forgot your password?</a></p>

            <div id="loginResultsContainer" class="helper-message"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Titan Coffee Run. Serving St. Petersburg College.</p>
    </footer>

    <script type="module" src="js/auth-ui.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
