<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a Titan Coffee Run account.">
    <title>Register | Titan Coffee Run</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Titan Coffee Run</h1>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="apply.html">Apply for Credit</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="#" id="logoutLink">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Create Your Account</h2>
            <p>Please complete the form below to register for Titan Coffee Run.</p>

            <form id="registrationForm" novalidate>
                <div class="form-row">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="First name">
                    <span class="helper-message" id="firstNameHelper"></span>
                </div>

                <div class="form-row">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Last name">
                    <span class="helper-message" id="lastNameHelper"></span>
                </div>

                <div class="form-row">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com">
                    <span class="helper-message" id="emailHelper"></span>
                </div>

                <div class="form-row">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password">
                    <span class="helper-message" id="passwordHelper"></span>
                    <span class="helper-message" id="passwordStrength"></span>
                </div>

                <div class="form-row">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password">
                    <span class="helper-message" id="confirmPasswordHelper"></span>
                    <span class="helper-message" id="passwordMatch"></span>
                </div>

                <div class="form-row checkbox-row">
                    <input type="checkbox" id="terms" name="terms">
                    <label for="terms">
                        I agree to the Titan Coffee Run Terms and Conditions.
                    </label>
                    
                </div>                
                <span class="helper-message" id="termsHelper"></span>

                <div class="button-row">
                    <button type="submit" id="registerButton" >Register</button>
                </div>
            </form>

            <div id="resultsContainer"></div>
        
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Titan Coffee Run. Serving St. Petersburg College.</p>
    </footer>

    <!--
        Using type="module" allows this script to use ES6 module syntax (import/export)
        so we can organize code into separate files (User, StorageManager, FormValidator)
      
        BIG NOTE:  ES6 module scripts should be opened through a local server, not file:///  
        I loaded the extension: Live Server to Visual Studio Code and use that to launch the project
    -->
    <script type="module" src="js/registration.js"></script>
</body>
</html>
