<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Apply for a Titan Coffee Run credit line.">
  <title>Apply for Credit | Titan Coffee Run</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Titan Coffee Run</h1>    

    <nav aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="apply.html">Apply for Credit</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="login.html" id="loginLink">Login</a></li>
        <li><a href="#" id="logoutLink">Logout</a></li>
        <li><a href="reset-password.html" id="resetPasswordLink">Change Password</a></li>
      </ul>
    </nav>
  </header>

  <main>
  <section class="form-section">
    <h2>Apply for a Titan Coffee Run Credit Line</h2>
    <p>
      Please complete the application below. All fields are required.
    </p>

    <form id="creditApplicationForm" novalidate>
      
      <div class="form-row">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="name@example.com">
        <span class="error-message" id="emailError"></span>
      </div>

      <div class="form-row">
        <label for="confirmEmail">Re-enter Email Address</label>
        <input type="email" id="confirmEmail" name="confirmEmail" placeholder="Re-enter your email">
        <span class="error-message" id="confirmEmailError"></span>
      </div>

      <div class="form-row">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" placeholder="First name">
        <span class="error-message" id="firstNameError"></span>
      </div>

      <div class="form-row">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" placeholder="Last name">
        <span class="error-message" id="lastNameError"></span>
      </div>

      <div class="form-row">
        <label for="city">City</label>
        <input type="text" id="city" name="city" placeholder="City">
        <span class="error-message" id="cityError"></span>
      </div>

      <!-- for simplicity, I only listed a few states instead of ALL fifty -->
      <div class="form-row">
        <label for="state">State</label>
        <select id="state" name="state">
          <option value="">Select a state</option>
          <option value="FL">Florida</option>
          <option value="GA">Georgia</option>
          <option value="AL">Alabama</option>
          <option value="SC">South Carolina</option>
        </select>
        <span class="error-message" id="stateError"></span>
      </div>

      <div class="form-row">
        <label for="zipCode">ZIP Code</label>
        <input type="text" id="zipCode" name="zipCode" placeholder="5-digit ZIP code" maxlength="5">
        <span class="error-message" id="zipCodeError"></span>
      </div>

      <div class="form-row">
        <label for="grossIncome">Gross Income</label>
        <input type="number" id="grossIncome" name="grossIncome" placeholder="Enter gross income" min="0" step="0.01">
        <span class="error-message" id="grossIncomeError"></span>
      </div>

      <div class="form-row">
        <label for="ssnLast4">Last 4 Digits of SSN</label>
        <input type="text" id="ssnLast4" name="ssnLast4" placeholder="Last 4 digits" maxlength="4">
        <span class="error-message" id="ssnLast4Error"></span>
      </div>

      <div class="form-row checkbox-row">
        <input type="checkbox" id="consent" name="consent">
        <label for="consent">
          I certify that the information provided is accurate and I authorize Titan Coffee Run to review my application.
        </label>
      </div>
      <span class="error-message" id="consentError"></span>

      <div class="button-row">
        <button type="submit" id="applyButton">Apply</button>
        <button type="reset" id="resetButton">Reset</button>
      </div>
    </form>

    <div id="resultsContainer"></div>
  </section>
</main>

  <footer>
    <p>&copy; 2026 Titan Coffee Run. Serving St. Petersburg College.</p>
  </footer>

  <script type="module" src="js/auth-ui.js"></script>
  <script src="js/qualify.js"></script>
</body>
</html>
